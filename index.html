<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Prova Front-end</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f4f4f4; }
        header { background: #333; color: white; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; margin-left: 15px; text-decoration: none; }
        
        .container { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            padding: 40px; 
            width: 100%;
            box-sizing: border-box;
        }
        
        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            flex: 1; 
            height: 140px; 
            min-width: 0; 
        }
        
        button { background: #007bff; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }

        .form-section { text-align: center; margin: 20px 0; padding-bottom: 20px; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        
        #mensagemBoasVindas { margin-top: 15px; font-weight: bold; color: #333; min-height: 20px; }
        
        footer { background: #333; color: white; text-align: center; padding: 10px; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

<header>
    <h2>Prova Front-end</h2>
    <nav>
        <a href="#">Home</a> <a href="#">Sobre</a> <a href="#">Contato</a>
    </nav>
</header>

<div class="container">
    <div class="card">
        <h3>Card 1</h3>
        <p>Conteúdo de exemplo.</p>
        <button onclick="alertar(1)">Clique</button>
    </div>
    <div class="card">
        <h3>Card 2</h3>
        <p>Outro conteúdo.</p>
        <button onclick="alertar(2)">Clique</button>
    </div>
    <div class="card">
        <h3>Card 3</h3>
        <p>Mais um exemplo.</p>
        <button onclick="alertar(3)">Clique</button>
    </div>
</div>

<div class="form-section">
    <input type="text" id="nomeInput" placeholder="Digite seu nome">
    <button onclick="exibirSaudacao()">Enviar</button>
    <div id="mensagemBoasVindas"></div>
</div>

<footer>Aluno: Felipe Paiaro | Prova prática de Front-end</footer>

<script>
    function alertar(numero) {
        alert("Você clicou no card " + numero);
    }

    function exibirSaudacao() {
        const nome = document.getElementById("nomeInput").value;
        const display = document.getElementById("mensagemBoasVindas");
        
        if (nome.trim() !== "") {
            display.innerText = "Olá, " + nome + "!";
        } else {
            display.innerText = "Por favor, digite um nome.";
        }
    }
</script>

</body>
</html>
